<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Password</title>
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--Custom CSS-->
    <link rel="stylesheet" href="css/style.css">
    <!--Font-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="card text-center w-50 mx-auto">

  <div class="card-header p-3">
    Generate secure, random passwords to stay safe online
  </div>

  <div class="card-body p-3">
    
    <div class="mb-3">
        <label class="form-label">Generated Password</label>

        <div class="input-group">
            <input type="text" class="form-control" id="password" placeholder="*******">
            <button class="btn btn-outline-secondary" id="copyPassword" type="button"><i class="fa-solid fa-copy"></i></button>
        </div>
    </div>

    <div class="mb-3">
        <button type="button" id="genPassBtn" class="btn btn-outline-success">Generate Random Password</button>
        <button type="button" id="resetBtn" class="btn btn-outline-secondary btn-sm">Reset</button>
    </div>


  </div>

  <div class="card-footer text-center p-3">
   
    <div class="d-flex align-items-center justify-content-center gap-3 flex-wrap">

        <!-- Length Label -->
        <span>Length</span>

        <!-- Slider -->
        <input type="range" id="lengthSlider" class="form-range w-25" min="0" max="30" value="0">

        <!-- Value -->
        <span id="lengthValue">0</span>

        <!-- Numbers Checkbox -->
        <div class="form-check ms-3">
            <input class="form-check-input" type="checkbox" id="numPassword">
            <label class="form-check-label" for="numbers">
                Numbers
            </label>
        </div>

        <!-- Symbols Checkbox -->
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="symbolsPassword">
            <label class="form-check-label" for="symbols">
                Symbols
            </label>
        </div>

    </div>

    
  </div>
</div>

<!--Custom JS-->
<script src="js/script.js"></script>
<!--Bootstrap JS-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
